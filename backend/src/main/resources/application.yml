server:
  port: ${PORT:18080}

spring:
  application:
    name: portfolio-backend
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/anti_portfolio}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:password}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:*,http://127.0.0.1:*}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-local-development-secret-32-plus-chars}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  upload-dir: ${UPLOAD_DIR:uploads}
  seed:
    enabled: ${SEED_ENABLED:true}
    admin-email: ${SEED_ADMIN_EMAIL:mohan2005@admin.com}
    admin-password: ${SEED_ADMIN_PASSWORD:mohanadmin}
