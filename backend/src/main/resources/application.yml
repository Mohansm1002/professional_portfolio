server:
  port: ${PORT:18080}

spring:
  config:
    import:
      - optional:file:.env[.properties]
      - optional:file:backend/.env[.properties]
  application:
    name: portfolio-backend
  datasource:
    url: "${DATABASE_URL:jdbc:postgresql://ep-royal-block-at4q08vt-pooler.c-9.us-east-1.aws.neon.tech/neondb?sslmode=require&channelBinding=require}"
    username: "${DATABASE_USERNAME:neondb_owner}"
    password: "${DATABASE_PASSWORD:}"
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  jackson:
    property-naming-strategy: SNAKE_CASE
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:https://professional-portfolio-1-4pcp.onrender.com}
  jwt:
    secret: ${JWT_SECRET:change-me-to-a-long-local-development-secret-32-plus-chars}
    expiration-minutes: ${JWT_EXPIRATION_MINUTES:720}
  upload-dir: ${UPLOAD_DIR:uploads}
  seed:
    enabled: ${SEED_ENABLED:false}
    admin-email: ${SEED_ADMIN_EMAIL:mohan2005@admin.com}
    admin-password: ${SEED_ADMIN_PASSWORD:}
