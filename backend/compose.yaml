services:
  postgres:
    image: postgres:16
    container_name: anti_portfolio_postgres
    environment:
      POSTGRES_DB: anti_portfolio
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - anti_portfolio_pgdata:/var/lib/postgresql/data

volumes:
  anti_portfolio_pgdata:
